<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Happy Birthday 🎉</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #ff9a9e, #fad0c4);
      overflow: hidden;
    }

    .container {
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      text-align: center;
      color: #fff;
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 10px;
    }

    /* WhatsApp Chat Style */
    .chat-box {
      width: 300px;
      max-width: 90%;
      background: #ece5dd;
      border-radius: 15px;
      padding: 10px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }

    .message {
      background: #dcf8c6;
      padding: 8px 12px;
      border-radius: 10px;
      margin: 5px 0;
      width: fit-content;
      max-width: 80%;
      text-align: left;
      opacity: 0;
      transform: translateY(10px);
      animation: fadeIn 0.5s forwards;
    }

    .typing {
      font-style: italic;
      font-size: 0.9rem;
      color: #666;
    }

    @keyframes fadeIn {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .btn {
      margin-top: 20px;
      padding: 10px 20px;
      background: #25D366;
      border: none;
      border-radius: 25px;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    .btn:hover {
      background: #1ebe5d;
    }

    .hidden {
      display: none;
    }

    .final {
      font-size: 2rem;
      margin-top: 20px;
      animation: pop 1s ease forwards;
    }

    @keyframes pop {
      0% { transform: scale(0); }
      100% { transform: scale(1); }
    }
  </style>
</head>
<body>

<div class="container">
  <h1>Happy Birthday 🎂</h1>

  <div class="chat-box" id="chat"></div>

  <button class="btn" onclick="startChat()">Start Message 💬</button>

  <div class="final hidden" id="finalText">You are special ❤️</div>
</div>

<audio autoplay loop>
  <source src="https://www2.cs.uic.edu/~i101/SoundFiles/HappyBirthday.mid">
</audio>

<script>
const messages = [
  "Allo Bubzz 😆",
  "Cie ultahhh 🎉",
  "Belum tidur ya? 😜",
  "Aku cuma mau bilang...",
  "Happy birthday ya ❤️",
  "Semoga selalu bahagia & sehat 🤍",
  "Dan semoga...",
  "Kita selalu bareng 😌"
];

let index = 0;

function startChat() {
  const chat = document.getElementById('chat');
  document.querySelector('.btn').style.display = 'none';

  function showMessage() {
    if (index < messages.length) {
      const typing = document.createElement('div');
      typing.className = 'typing';
      typing.innerText = 'typing...';
      chat.appendChild(typing);

      setTimeout(() => {
        chat.removeChild(typing);

        const msg = document.createElement('div');
        msg.className = 'message';
        msg.innerText = messages[index];
        chat.appendChild(msg);

        chat.scrollTop = chat.scrollHeight;
        index++;
        setTimeout(showMessage, 1200);
      }, 800);
    } else {
      document.getElementById('finalText').classList.remove('hidden');
    }
  }

  showMessage();
}
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Birthday Story ❤️</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #ff9a9e, #fad0c4);
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .scene {
      position: absolute;
      text-align: center;
      color: white;
      opacity: 0;
      transition: opacity 1s ease;
    }

    .active { opacity: 1; }

    h1 { font-size: 2.5rem; }

    /* CHAT STYLE */
    .chat-box {
      width: 300px;
      background: #ece5dd;
      border-radius: 15px;
      padding: 10px;
      margin: auto;
    }

    .msg {
      padding: 8px 12px;
      border-radius: 10px;
      margin: 5px 0;
      max-width: 80%;
      font-size: 14px;
      animation: fade 0.3s ease;
    }

    .right {
      background: #dcf8c6;
      margin-left: auto;
      text-align: left;
    }

    .time {
      font-size: 10px;
      color: gray;
      text-align: right;
    }

    @keyframes fade {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    button {
      padding: 10px 20px;
      border: none;
      border-radius: 20px;
      background: #25d366;
      color: white;
      font-weight: bold;
      cursor: pointer;
      margin-top: 20px;
    }

    .love {
      font-size: 35px;
      color: #ff4d6d;
      animation: pop 1s ease forwards;
    }

    @keyframes pop {
      from { transform: scale(0); }
      to { transform: scale(1); }
    }

    .confetti {
      position: absolute;
      width: 8px;
      height: 8px;
      top: -10px;
      animation: fall linear forwards;
    }

    @keyframes fall {
      to {
        transform: translateY(700px) rotate(360deg);
        opacity: 0;
      }
    }
  </style>
</head>
<body>

<!-- SCENE 1 -->
<div class="scene active" id="scene1">
  <h1>Hey Bubzz ❤️</h1>
  <p>I made something for you...</p>
  <button onclick="nextScene(2)">Click here</button>
</div>

<!-- SCENE 2 (CHAT WA STYLE) -->
<div class="scene" id="scene2">
  <div class="chat-box" id="chat"></div>
</div>

<!-- SCENE 3 -->
<div class="scene" id="scene3">
  <h1>It's Your Birthday 🎂</h1>
  <p>I hope all your wishes come true</p>
</div>

<!-- SCENE 4 -->
<div class="scene" id="scene4">
  <div class="love">I LOVE YOU, BUBZZ ❤️</div>
</div>

<script>
const messages = [
  "Hey bubzz 😆",
  "It's your birthday 🎉",
  "Are you still awake? 😜",
  "I just want to say something...",
  "Happy birthday ❤️",
  "I hope you're always happy 🤍",
  "And I hope...",
  "I can always be the one you choose 😌"
];

let i = 0;

function nextScene(n) {
  document.querySelectorAll('.scene').forEach(s => s.classList.remove('active'));
  document.getElementById('scene' + n).classList.add('active');

  if (n === 2) startChat();
  if (n === 3) setTimeout(() => nextScene(4), 2500);
  if (n === 4) confetti();
}

function getTime() {
  const d = new Date();
  return d.getHours() + ':' + String(d.getMinutes()).padStart(2,'0');
}

function startChat() {
  const chat = document.getElementById('chat');

  function send() {
    if (i >= messages.length) {
      setTimeout(() => nextScene(3), 1000);
      return;
    }

    const msg = document.createElement('div');
    msg.className = 'msg right';
    msg.innerHTML = messages[i] + '<div class="time">' + getTime() + ' ✔✔</div>';

    chat.appendChild(msg);
    chat.scrollTop = chat.scrollHeight;

    i++;
    setTimeout(send, 1200);
  }

  send();
}

function confetti() {
  for (let i = 0; i < 50; i++) {
    const c = document.createElement('div');
    c.className = 'confetti';
    c.style.left = Math.random() * 100 + '%';
    c.style.background = `hsl(${Math.random()*360},100%,50%)`;
    c.style.animationDuration = (Math.random() * 2 + 2) + 's';
    document.body.appendChild(c);

    setTimeout(() => c.remove(), 4000);
  }
}
</script>

</body>
</html>
